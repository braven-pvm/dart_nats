# Tag-based test filtering for Orchestra tiered test runner
#
# This file enables tag-based filtering for TDD workflows and selective test execution.
# See test-tier-migration-guide.md for detailed documentation.

tags:
  red:
    # TDD red-phase tests: failing tests awaiting implementation.
    # Orchestra's run_tests({ scope: "red" }) executes these.
    # Excluded from normal test runs with --exclude-tags=red.
    use_stubs: false

  smoke:
    # Smoke tests: fast sanity checks for project structure and configuration.
    # These tests run in <5 seconds and use no runtime execution.
    use_stubs: false

  unit:
    # Unit tests: isolated tests with no external dependencies.
    use_stubs: false

  integration:
    # Integration tests: require a running NATS server (Docker).
    use_stubs: false

  e2e:
    # End-to-end tests: may be slow, excluded from local dev runs.
    use_stubs: false

  slow:
    # Slow tests: performance tests, chaos tests, etc.
    # Excluded from default Orchestra test runs via dartExcludeTags.

presubmit:
  # Run before committing code in CI.
